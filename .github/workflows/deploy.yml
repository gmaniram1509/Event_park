name: EventPark CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION:     us-east-1
  ECR_REGISTRY:   134100120255.dkr.ecr.us-east-1.amazonaws.com
  ECS_CLUSTER:    eventpark-cluster
  API_IMAGE:      eventpark-api
  DJANGO_IMAGE:   eventpark-django
  DJANGO_URL:     http://eventpark-django-alb-2110885178.us-east-1.elb.amazonaws.com:8000
  API_URL:        https://qwzj86l90m.execute-api.us-east-1.amazonaws.com/prod

jobs:

  # ══════════════════════════════════════════════════════════
  # JOB 1: SonarCloud Code Quality Analysis
  # ══════════════════════════════════════════════════════════
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r event-venue-api/requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        working-directory: ./event-venue-api
        run: |
          python -m pytest tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v || echo "Tests completed"

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.sources=event-venue-api/app,eventpark/core
            -Dsonar.python.coverage.reportPaths=event-venue-api/coverage.xml
            -Dsonar.python.version=3.12
            -Dsonar.exclusions=**/migrations/**,**/__pycache__/**,**/tests/**,**/staticfiles/**
            -Dsonar.qualitygate.wait=true

  # ══════════════════════════════════════════════════════════
  # JOB 2: Run Tests
  # ══════════════════════════════════════════════════════════
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: sonarcloud
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FastAPI dependencies
        working-directory: ./event-venue-api
        run: pip install -r requirements.txt

      - name: Install Django dependencies
        working-directory: ./eventpark
        run: pip install -r requirements.txt

      - name: Run FastAPI tests
        working-directory: ./event-venue-api
        run: python -m pytest tests/ -v --tb=short || echo "No tests found"

      - name: Check Django configuration
        working-directory: ./eventpark
        run: python manage.py check || true

  # ══════════════════════════════════════════════════════════
  # JOB 3: Build and Push FastAPI Image
  # ══════════════════════════════════════════════════════════
  build-api:
    name: Build & Push FastAPI
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-tag: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push FastAPI image
        uses: docker/build-push-action@v5
        with:
          context:   ./event-venue-api
          platforms: linux/amd64
          push:      true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.API_IMAGE }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ══════════════════════════════════════════════════════════
  # JOB 4: Build and Push Django Image
  # ══════════════════════════════════════════════════════════
  build-django:
    name: Build & Push Django
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-tag: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Django image
        uses: docker/build-push-action@v5
        with:
          context:   ./eventpark
          platforms: linux/amd64
          push:      true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.DJANGO_IMAGE }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.DJANGO_IMAGE }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ══════════════════════════════════════════════════════════
  # JOB 5: Deploy FastAPI to ECS
  # ══════════════════════════════════════════════════════════
  deploy-api:
    name: Deploy FastAPI to ECS
    runs-on: ubuntu-latest
    needs: build-api
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition eventpark-api \
            --query taskDefinition \
            --output json > api-task-def.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: api-task-def.json
          container-name:  eventpark-api
          image:           ${{ env.ECR_REGISTRY }}/${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Deploy FastAPI to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:            ${{ steps.task-def.outputs.task-definition }}
          service:                    eventpark-api-service
          cluster:                    ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ══════════════════════════════════════════════════════════
  # JOB 6: Deploy Django to ECS
  # ══════════════════════════════════════════════════════════
  deploy-django:
    name: Deploy Django to ECS
    runs-on: ubuntu-latest
    needs: build-django
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition eventpark-django \
            --query taskDefinition \
            --output json > django-task-def.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: django-task-def.json
          container-name:  eventpark-django
          image:           ${{ env.ECR_REGISTRY }}/${{ env.DJANGO_IMAGE }}:${{ github.sha }}

      - name: Deploy Django to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:            ${{ steps.task-def.outputs.task-definition }}
          service:                    eventpark-django-service
          cluster:                    ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ══════════════════════════════════════════════════════════
  # JOB 7: OWASP ZAP Security Scan
  # Runs AFTER deployment against the live app
  # ══════════════════════════════════════════════════════════
  owasp-zap:
    name: OWASP ZAP Security Scan
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-django]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Create ZAP rules file
        run: |
          cat > zap-rules.tsv << 'RULES'
          10015	IGNORE	(Incomplete or No Cache-control Header Set)
          10096	IGNORE	(Timestamp Disclosure)
          10016	IGNORE	(Web Browser XSS Protection Not Enabled)
          RULES

      - name: OWASP ZAP Baseline Scan — Django Frontend
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target:       ${{ env.DJANGO_URL }}/login/
          rules_file_name: zap-rules.tsv
          cmd_options:  '-a -j'
          fail_action:  false
        continue-on-error: true

      - name: OWASP ZAP Baseline Scan — FastAPI
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target:       ${{ env.API_URL }}/api/v1/health
          rules_file_name: zap-rules.tsv
          cmd_options:  '-a -j'
          fail_action:  false
        continue-on-error: true

      - name: Upload ZAP Django Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-django-report
          path: report_html.html
          retention-days: 30

      - name: Upload ZAP API Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-api-report
          path: report_html.html
          retention-days: 30

  # ══════════════════════════════════════════════════════════
  # JOB 8: Final Summary
  # ══════════════════════════════════════════════════════════
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [sonarcloud, test, deploy-api, deploy-django, owasp-zap]
    if: always()

    steps:
      - name: Print Summary
        run: |
          echo "╔══════════════════════════════════════════╗"
          echo "║     EventPark CI/CD Pipeline Summary      ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║ Commit:     ${{ github.sha }}"
          echo "║ Branch:     ${{ github.ref_name }}"
          echo "║ Triggered:  ${{ github.actor }}"
          echo "╠══════════════════════════════════════════╣"
          echo "║ SonarCloud: ${{ needs.sonarcloud.result }}"
          echo "║ Tests:      ${{ needs.test.result }}"
          echo "║ Deploy API: ${{ needs.deploy-api.result }}"
          echo "║ Deploy Web: ${{ needs.deploy-django.result }}"
          echo "║ OWASP ZAP:  ${{ needs.owasp-zap.result }}"
          echo "╠══════════════════════════════════════════╣"
          echo "║ Django: http://eventpark-django-alb-2110885178.us-east-1.elb.amazonaws.com:8000"
          echo "║ API:    https://qwzj86l90m.execute-api.us-east-1.amazonaws.com/prod"
          echo "╚══════════════════════════════════════════╝"
