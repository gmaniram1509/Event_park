# SonarCloud configuration for EventPark
# Place this file at the ROOT of your project

sonar.projectKey=YOUR_SONAR_PROJECT_KEY
sonar.organization=YOUR_SONAR_ORGANIZATION

# Project info
sonar.projectName=EventPark
sonar.projectVersion=1.0

# Source directories
sonar.sources=event-venue-api/app,eventpark/core

# Exclusions
sonar.exclusions=\
  **/migrations/**, \
  **/__pycache__/**, \
  **/staticfiles/**, \
  **/tests/**, \
  **/*.pyc, \
  **/node_modules/**

# Python settings
sonar.python.version=3.12
sonar.python.coverage.reportPaths=event-venue-api/coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8
